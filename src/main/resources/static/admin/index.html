<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>머니헌터 관리자</title>
    <link rel="stylesheet" href="/admin/styles.css?v=20260530-04" />
  </head>
  <body>
    <main id="loginView" class="login-shell">
      <section class="login-panel">
        <p class="eyebrow">MONEY HUNTER ADMIN</p>
        <h1>관리자 인증</h1>
        <form id="loginForm">
          <label>
            <span>아이디</span>
            <input id="adminLoginIdInput" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input id="adminPasswordInput" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">접속</button>
          <p id="loginError" class="error-text"></p>
        </form>
      </section>
    </main>

    <main id="adminView" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <strong>머니헌터</strong>
          <span id="adminName">Admin</span>
        </div>
        <nav>
          <button class="nav-item active" data-view="dashboardView">대시보드</button>
          <button class="nav-item" data-view="policyView">정책값</button>
          <button class="nav-item" data-view="playerView">유저 관리</button>
          <button class="nav-item" data-view="anomalyView">이상징후</button>
          <button class="nav-item" data-view="auditView">감사 로그</button>
          <button class="nav-item" data-view="monitoringView">모니터링</button>
        </nav>
        <button id="logoutButton" class="ghost">로그아웃</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">LIVE OPS</p>
            <h2 id="pageTitle">대시보드</h2>
          </div>
          <button id="refreshButton" class="secondary">새로고침</button>
        </header>

        <section id="dashboardView" class="view">
          <div id="statusBand" class="status-band"></div>
          <div id="metricGrid" class="metric-grid"></div>
          <div id="economyPanel" class="dashboard-block"></div>
          <div id="monitoringPanel" class="dashboard-block"></div>
          <div id="playerGrowthPanel" class="dashboard-block"></div>
        </section>

        <section id="anomalyView" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h3>이상징후 감지</h3>
                <p>광고 호출, 보상 수령, 보유 재화, 버프 시간 상한을 기준으로 점검해요.</p>
              </div>
              <span id="anomalyUpdatedAt" class="muted"></span>
            </div>
            <div id="anomalySummary" class="anomaly-summary"></div>
            <div id="anomalyRules" class="anomaly-rules"></div>
            <div id="anomalyList" class="anomaly-list"></div>
            <p id="anomalyResult" class="feedback"></p>
          </section>
        </section>

        <section id="playerView" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h3>유저 관리</h3>
                <p>유저 키로 검색하고 정지, 정지 해제, 로그인부터 완전 초기화를 수행해요.</p>
              </div>
              <span id="playerCount" class="muted"></span>
            </div>
            <form id="playerSearchForm" class="player-search">
              <input id="playerSearchInput" type="search" placeholder="유저 키 검색" autocomplete="off" />
              <select id="playerFilterStatus" aria-label="상태 필터">
                <option value="ALL">전체 상태</option>
                <option value="ACTIVE">정상</option>
                <option value="SUSPENDED">정지</option>
              </select>
              <select id="playerFilterProgress" aria-label="진행 상태 필터">
                <option value="ALL">전체 진행</option>
                <option value="ONBOARDED">게임 시작</option>
                <option value="NEEDS_JOB">직업 미선택</option>
                <option value="FEATURE_TUTORIAL_DONE">튜토리얼 완료</option>
              </select>
              <button class="secondary" type="submit">검색</button>
              <button id="playerFilterClearButton" class="ghost" type="button">초기화</button>
            </form>
            <p id="playerResult" class="feedback"></p>
            <div class="player-console">
              <div id="playerList" class="player-list"></div>
              <aside id="playerDetail" class="player-detail"></aside>
            </div>
          </section>
        </section>

        <section id="policyView" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h3>운영 정책값</h3>
                <p>저장 즉시 서버 캐시에 반영돼요.</p>
              </div>
              <span id="policyCount" class="muted"></span>
            </div>
            <div id="policyList" class="policy-list"></div>
            <p id="policyResult" class="feedback"></p>
          </section>
        </section>

        <section id="auditView" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h3>감사 로그</h3>
                <p>정책값 변경과 초기화 기록이 남아요.</p>
              </div>
              <span id="auditPageInfo" class="muted"></span>
            </div>
            <div id="auditList" class="audit-list"></div>
            <div class="pager">
              <button id="prevAuditButton" class="ghost">이전</button>
              <button id="nextAuditButton" class="ghost">다음</button>
            </div>
          </section>
        </section>

        <section id="monitoringView" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h3>서버 모니터링</h3>
                <p>관리자 페이지 안에서 서버 런타임과 운영 상태를 확인해요.</p>
              </div>
              <span id="serverMetricsUpdatedAt" class="muted"></span>
            </div>
            <div id="serverMetricsGrid" class="metric-grid"></div>
            <div id="serverRuntimePanel" class="monitoring-panel"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/admin/app.js?v=20260530-04"></script>
  </body>
</html>
