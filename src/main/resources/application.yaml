    review-tools-enabled: false
    guest-user-enabled: false
    mock-monetization-enabled: false
    integration-mode: ${MONEY_HUNTER_INTEGRATION_MODE:toss-production}
    distribution-target: TOSS
    toss-login-enabled: ${TOSS_LOGIN_ENABLED:false}
    toss-user-key-enabled: ${TOSS_USER_KEY_ENABLED:false}
    real-reward-ads-enabled: ${TOSS_REWARD_ADS_ENABLED:false}
    real-banner-ads-enabled: ${TOSS_BANNER_ADS_ENABLED:false}
    real-payments-enabled: ${TOSS_PAYMENTS_ENABLED:false}
    real-iap-order-verification-enabled: ${TOSS_IAP_ORDER_VERIFICATION_ENABLED:true}
    real-toss-point-rewards-enabled: ${TOSS_POINT_REWARDS_ENABLED:false}
    real-smart-message-enabled: ${TOSS_SMART_MESSAGE_ENABLED:false}
    real-share-reward-enabled: ${TOSS_SHARE_REWARD_ENABLED:false}
    dungeon-coupon-enabled: ${MONEY_HUNTER_DUNGEON_COUPON_ENABLED:false}
  security:
    cors:
      allowed-origin-patterns:
        - https://gold-hunter.apps.tossmini.com
        - https://gold-hunter.private-apps.tossmini.com
        - https://money-hunter-prod-*.a.run.app

