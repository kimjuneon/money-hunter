spring:
  application:
    name: money-hunter
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

money-hunter:
  app:
    review-tools-enabled: true
    guest-user-enabled: true
    mock-monetization-enabled: true
    apps-in-toss-app-name: gold-hunter
    integration-mode: mock
    distribution-target: TOSS
    toss-login-enabled: false
    toss-user-key-enabled: false
    real-reward-ads-enabled: false
    real-banner-ads-enabled: false
    real-payments-enabled: false
    real-iap-order-verification-enabled: true
    real-toss-point-rewards-enabled: ${TOSS_POINT_REWARDS_ENABLED:false}
    real-smart-message-enabled: false
    real-share-reward-enabled: false
    dungeon-coupon-enabled: true
  admin:
    username: ${MONEY_HUNTER_ADMIN_USERNAME:}
    password-bcrypt: ${MONEY_HUNTER_ADMIN_PASSWORD_BCRYPT:}
    password: ${MONEY_HUNTER_ADMIN_PASSWORD:}
    allow-plain-password: ${MONEY_HUNTER_ADMIN_ALLOW_PLAIN_PASSWORD:false}
  toss-api:
    base-url: ${TOSS_API_BASE_URL:https://apps-in-toss-api.toss.im}
    mtls-certificate-pem: ${TOSS_API_MTLS_CERTIFICATE_PEM:}
    mtls-private-key-pem: ${TOSS_API_MTLS_PRIVATE_KEY_PEM:}
    mtls-certificate-path: ${TOSS_API_MTLS_CERTIFICATE_PATH:}
    mtls-private-key-path: ${TOSS_API_MTLS_PRIVATE_KEY_PATH:}
    connect-timeout: 3s
    request-timeout: 5s
  ads:
    mode: ${TOSS_AD_MODE:test}
    auto-hunt-reward-ad-group-id: ${TOSS_AD_GROUP_AUTO_HUNT_ID:}
    skill-point-reward-ad-group-id: ${TOSS_AD_GROUP_SKILL_POINT_ID:}
    reward-claim-reward-ad-group-id: ${TOSS_AD_GROUP_REWARD_CLAIM_ID:}
    dungeon-additional-reward-ad-group-id: ${TOSS_AD_GROUP_DUNGEON_ADDITIONAL_ID:}
    mini-game-continue-reward-ad-group-id: ${TOSS_AD_GROUP_MINI_GAME_CONTINUE_ID:}
    job-change-interstitial-ad-group-id: ${TOSS_AD_GROUP_JOB_CHANGE_ID:}
    banner-ad-group-id: ${TOSS_AD_GROUP_BANNER_ID:}
  iap:
    flare-pet-product-id: ${TOSS_IAP_FLARE_PET_PRODUCT_ID:}
    aqua-pet-product-id: ${TOSS_IAP_AQUA_PET_PRODUCT_ID:}
    skill-point-pack-product-id: ${TOSS_IAP_SKILL_POINT_PACK_PRODUCT_ID:}
    vip-monthly-product-id: ${TOSS_IAP_VIP_MONTHLY_PRODUCT_ID:}
  share-reward:
    module-id: ${TOSS_SHARE_REWARD_MODULE_ID:}
    message: ${TOSS_SHARE_REWARD_MESSAGE:친구에게 공유하고 SP 1개를 받아요}
  promotion:
    reward-claim-code: ${TOSS_PROMOTION_REWARD_CLAIM_CODE:}
    benefit-tab-new-user-code: ${TOSS_PROMOTION_BENEFIT_TAB_NEW_USER_CODE:}
    benefit-tab-new-user-amount: ${TOSS_PROMOTION_BENEFIT_TAB_NEW_USER_AMOUNT:30}
  smart-message:
    auto-hunt-ended-template-set-code: ${TOSS_AUTO_HUNT_ENDED_TEMPLATE_SET_CODE:}
    auto-hunt-ended-agreement-template-code: ${TOSS_AUTO_HUNT_ENDED_AGREEMENT_TEMPLATE_CODE:}
    landing-url: ${TOSS_AUTO_HUNT_ENDED_LANDING_URL:intoss://gold-hunter}
    rookie-event-mission-arrived-enabled: ${TOSS_ROOKIE_EVENT_MISSION_SMART_MESSAGE_ENABLED:false}
    rookie-event-mission-arrived-template-set-code: ${TOSS_ROOKIE_EVENT_MISSION_ARRIVED_TEMPLATE_SET_CODE:}
    rookie-event-mission-agreement-template-code: ${TOSS_ROOKIE_EVENT_MISSION_AGREEMENT_TEMPLATE_CODE:}
    rookie-event-mission-batch-size: ${TOSS_ROOKIE_EVENT_MISSION_SMART_MESSAGE_BATCH_SIZE:100}
    dormant-sp-reward-enabled: ${TOSS_DORMANT_SP_REWARD_SMART_MESSAGE_ENABLED:false}
    dormant-sp-reward-template-set-code: ${TOSS_DORMANT_SP_REWARD_TEMPLATE_SET_CODE:}
    dormant-sp-reward-batch-size: ${TOSS_DORMANT_SP_REWARD_SMART_MESSAGE_BATCH_SIZE:100}
    dungeon-explore-available-enabled: ${TOSS_DUNGEON_EXPLORE_AVAILABLE_SMART_MESSAGE_ENABLED:false}
    dungeon-explore-available-template-set-code: ${TOSS_DUNGEON_EXPLORE_AVAILABLE_TEMPLATE_SET_CODE:}
    dungeon-explore-available-batch-size: ${TOSS_DUNGEON_EXPLORE_AVAILABLE_SMART_MESSAGE_BATCH_SIZE:100}
    battle-ready-daily-enabled: ${TOSS_BATTLE_READY_DAILY_SMART_MESSAGE_ENABLED:false}
    battle-ready-daily-template-set-code: ${TOSS_BATTLE_READY_DAILY_TEMPLATE_SET_CODE:}
    battle-ready-daily-batch-size: ${TOSS_BATTLE_READY_DAILY_SMART_MESSAGE_BATCH_SIZE:100}
  security:
    cors:
      allowed-origin-patterns:
        - https://gold-hunter.apps.tossmini.com
        - https://gold-hunter.private-apps.tossmini.com
        - https://money-hunter-prod-*.a.run.app
        - https://money-hunter-review-*.a.run.app
        - http://localhost:*
        - http://127.0.0.1:*
        - http://10.*:*
        - http://172.16.*:*
        - http://172.17.*:*
        - http://172.18.*:*
        - http://172.19.*:*
        - http://172.20.*:*
        - http://172.21.*:*
        - http://172.22.*:*
        - http://172.23.*:*
        - http://172.24.*:*
        - http://172.25.*:*
        - http://172.26.*:*
        - http://172.27.*:*
        - http://172.28.*:*
        - http://172.29.*:*
        - http://172.30.*:*
        - http://172.31.*:*
        - http://192.168.*:*
  economy:
    ad-revenue-per-reward-ad-won: 60
    gold-per-toss-point: 100
    companion-price-won: 4900
    skill-point-pack-price-won: 999
    skill-point-pack-amount: 10
    friend-invite-reward-skill-points: 1
    friend-invite-limit: 5
    max-character-slots: 3
    auto-hunt-ad-seconds: 1800
    auto-hunt-ad-cooldown-seconds: 180
    max-ad-seconds: 14400
    dungeon-free-daily-limit: 3
    dungeon-additional-daily-limit: 2
    dungeon-reentry-cooldown-seconds: 1800
    skill-point-ad-cooldown-seconds: 1800
    reward-gold-threshold: 1000
    reward-point-amount: 10
    anomaly-limit-per-rule: 20
    anomaly-ad-events-per-hour-warning: 20
    anomaly-reward-claims-per-day-warning: 3
    anomaly-gold-threshold-multiplier: 3
    anomaly-skill-points-warning: 100
    anomaly-timer-grace-seconds: 120

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/money_hunter_local}
    username: ${SPRING_DATASOURCE_USERNAME:money_hunter}
    password: ${SPRING_DATASOURCE_PASSWORD:money_hunter}
money-hunter:
  promotion:
    reward-claim-code: ${TOSS_PROMOTION_REWARD_CLAIM_CODE:LOCAL_REWARD_CLAIM_TEST}
    benefit-tab-new-user-code: ${TOSS_PROMOTION_BENEFIT_TAB_NEW_USER_CODE:LOCAL_BENEFIT_TAB_NEW_USER_TEST}

