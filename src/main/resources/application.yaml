spring:
  application:
    name: money-hunter
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

money-hunter:
  app:
    review-tools-enabled: true
    guest-user-enabled: true
    mock-monetization-enabled: true
    apps-in-toss-app-name: money-hunter
    integration-mode: mock
    toss-login-enabled: false
    toss-user-key-enabled: false
    real-reward-ads-enabled: false
    real-banner-ads-enabled: false
    real-payments-enabled: false
    real-toss-point-rewards-enabled: false
    real-smart-message-enabled: false
    real-share-reward-enabled: false
  economy:
    ad-revenue-per-reward-ad-won: 60
    gold-per-toss-point: 100
    companion-price-won: 4900
    skill-point-pack-price-won: 999
    skill-point-pack-amount: 10
    friend-invite-reward-skill-points: 5
    friend-invite-limit: 3
    max-character-slots: 3
    auto-hunt-ad-seconds: 3600
    boost-ad-seconds: 3600
    max-ad-seconds: 14400
    reward-gold-threshold: 12000
    reward-point-amount: 120

---
spring:
  config:
    activate:
      on-profile: prod

money-hunter:
  app:
    review-tools-enabled: false
    guest-user-enabled: false
    mock-monetization-enabled: false
    integration-mode: ${MONEY_HUNTER_INTEGRATION_MODE:toss-production}
    toss-login-enabled: ${TOSS_LOGIN_ENABLED:false}
    toss-user-key-enabled: ${TOSS_USER_KEY_ENABLED:false}
    real-reward-ads-enabled: ${TOSS_REWARD_ADS_ENABLED:false}
    real-banner-ads-enabled: ${TOSS_BANNER_ADS_ENABLED:false}
    real-payments-enabled: ${TOSS_PAYMENTS_ENABLED:false}
    real-toss-point-rewards-enabled: ${TOSS_POINT_REWARDS_ENABLED:false}
    real-smart-message-enabled: ${TOSS_SMART_MESSAGE_ENABLED:false}
    real-share-reward-enabled: ${TOSS_SHARE_REWARD_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: review

money-hunter:
  app:
    review-tools-enabled: true
    guest-user-enabled: true
    mock-monetization-enabled: true
    integration-mode: review-mock
