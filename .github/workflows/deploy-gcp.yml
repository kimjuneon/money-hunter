name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: review
        type: choice
        options:
          - review
          - prod
          - all

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'money-hunter' }}
  REVIEW_SERVICE: ${{ vars.GCP_REVIEW_SERVICE || 'money-hunter-review' }}
  PROD_SERVICE: ${{ vars.GCP_PROD_SERVICE || 'money-hunter-prod' }}
  CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
  DB_USER: ${{ vars.GCP_DB_USER || 'money_hunter_app' }}
  DB_PASSWORD_SECRET: ${{ vars.GCP_DB_PASSWORD_SECRET || 'money-hunter-db-password' }}
  PROD_DB_NAME: ${{ vars.GCP_PROD_DB_NAME || 'money_hunter' }}
  REVIEW_DB_NAME: ${{ vars.GCP_REVIEW_DB_NAME || 'money_hunter_review' }}
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
  PROD_CPU: ${{ vars.GCP_PROD_CPU || '1' }}
  PROD_MEMORY: ${{ vars.GCP_PROD_MEMORY || '1Gi' }}
  PROD_MIN_INSTANCES: ${{ vars.GCP_PROD_MIN_INSTANCES || '1' }}
  PROD_MAX_INSTANCES: ${{ vars.GCP_PROD_MAX_INSTANCES || '3' }}
  PROD_CONCURRENCY: ${{ vars.GCP_PROD_CONCURRENCY || '40' }}
  PROD_TIMEOUT: ${{ vars.GCP_PROD_TIMEOUT || '30s' }}
  TOSS_LOGIN_ENABLED: ${{ vars.TOSS_LOGIN_ENABLED || 'false' }}
  TOSS_USER_KEY_ENABLED: ${{ vars.TOSS_USER_KEY_ENABLED || vars.TOSS_LOGIN_ENABLED || 'false' }}
  TOSS_REWARD_ADS_ENABLED: ${{ vars.TOSS_REWARD_ADS_ENABLED || 'false' }}
  TOSS_BANNER_ADS_ENABLED: ${{ vars.TOSS_BANNER_ADS_ENABLED || 'false' }}
  TOSS_API_MTLS_CERTIFICATE_SECRET: ${{ vars.TOSS_API_MTLS_CERTIFICATE_SECRET || '' }}
  TOSS_API_MTLS_PRIVATE_KEY_SECRET: ${{ vars.TOSS_API_MTLS_PRIVATE_KEY_SECRET || '' }}
  TOSS_AD_GROUP_AUTO_HUNT_ID: ${{ vars.TOSS_AD_GROUP_AUTO_HUNT_ID || '' }}
  TOSS_AD_GROUP_BOOST_ID: ${{ vars.TOSS_AD_GROUP_BOOST_ID || '' }}
  TOSS_AD_GROUP_SKILL_POINT_ID: ${{ vars.TOSS_AD_GROUP_SKILL_POINT_ID || '' }}
  TOSS_AD_GROUP_REWARD_CLAIM_ID: ${{ vars.TOSS_AD_GROUP_REWARD_CLAIM_ID || '' }}
  TOSS_AD_GROUP_JOB_CHANGE_ID: ${{ vars.TOSS_AD_GROUP_JOB_CHANGE_ID || '' }}
  TOSS_AD_GROUP_BANNER_ID: ${{ vars.TOSS_AD_GROUP_BANNER_ID || '' }}
  ADMIN_USERNAME: ${{ vars.MONEY_HUNTER_ADMIN_USERNAME || '' }}
  ADMIN_PASSWORD_BCRYPT_SECRET: ${{ vars.GCP_ADMIN_PASSWORD_BCRYPT_SECRET || '' }}

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' &&
      vars.GCP_DEPLOYER_SERVICE_ACCOUNT != '' &&
      vars.GCP_CLOUD_SQL_INSTANCE != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        env:
          MONEY_HUNTER_ADMIN_USERNAME: ci-admin
          MONEY_HUNTER_ADMIN_PASSWORD_BCRYPT: '$2a$10$aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
        run: ./gradlew test --no-daemon

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deployment variables
        run: |
          test -n "$PROJECT_ID"
          test -n "$CLOUD_SQL_INSTANCE"
          test -n "$RUNTIME_SERVICE_ACCOUNT"
          test -n "$ADMIN_USERNAME"
          test -n "$ADMIN_PASSWORD_BCRYPT_SECRET"
          test -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          test -n "${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/money-hunter:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker build --tag "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy review service
        if: github.event_name == 'push' || github.event.inputs.target == 'review' || github.event.inputs.target == 'all'
        run: |
          REVIEW_DATASOURCE_URL="jdbc:postgresql://google/${REVIEW_DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
          REVIEW_ENV_VARS="SPRING_PROFILES_ACTIVE=review,SPRING_DATASOURCE_URL=${REVIEW_DATASOURCE_URL},SPRING_DATASOURCE_USERNAME=${DB_USER},SPRING_DATASOURCE_MAX_POOL_SIZE=5,MONEY_HUNTER_ADMIN_USERNAME=${ADMIN_USERNAME}"
          REVIEW_SECRETS="SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD_SECRET}:latest"
          if [ -n "$ADMIN_PASSWORD_BCRYPT_SECRET" ]; then
            REVIEW_SECRETS="${REVIEW_SECRETS},MONEY_HUNTER_ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT_SECRET}:latest"
          fi
          gcloud run deploy "$REVIEW_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE" \
            --allow-unauthenticated \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --set-env-vars "$REVIEW_ENV_VARS" \
            --set-secrets "$REVIEW_SECRETS"
          gcloud run services describe "$REVIEW_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format "value(status.url)"

      - name: Deploy production service
        if: github.event.inputs.target == 'prod' || github.event.inputs.target == 'all'
        run: |
          PROD_DATASOURCE_URL="jdbc:postgresql://google/${PROD_DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
          PROD_ENV_VARS="SPRING_PROFILES_ACTIVE=prod,SPRING_DATASOURCE_URL=${PROD_DATASOURCE_URL},SPRING_DATASOURCE_USERNAME=${DB_USER},SPRING_DATASOURCE_MAX_POOL_SIZE=5,TOSS_LOGIN_ENABLED=${TOSS_LOGIN_ENABLED},TOSS_USER_KEY_ENABLED=${TOSS_USER_KEY_ENABLED},TOSS_REWARD_ADS_ENABLED=${TOSS_REWARD_ADS_ENABLED},TOSS_BANNER_ADS_ENABLED=${TOSS_BANNER_ADS_ENABLED},TOSS_AD_GROUP_AUTO_HUNT_ID=${TOSS_AD_GROUP_AUTO_HUNT_ID},TOSS_AD_GROUP_BOOST_ID=${TOSS_AD_GROUP_BOOST_ID},TOSS_AD_GROUP_SKILL_POINT_ID=${TOSS_AD_GROUP_SKILL_POINT_ID},TOSS_AD_GROUP_REWARD_CLAIM_ID=${TOSS_AD_GROUP_REWARD_CLAIM_ID},TOSS_AD_GROUP_JOB_CHANGE_ID=${TOSS_AD_GROUP_JOB_CHANGE_ID},TOSS_AD_GROUP_BANNER_ID=${TOSS_AD_GROUP_BANNER_ID},MONEY_HUNTER_ADMIN_USERNAME=${ADMIN_USERNAME}"
          PROD_SECRETS="SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD_SECRET}:latest"
          if [ -n "$ADMIN_PASSWORD_BCRYPT_SECRET" ]; then
            PROD_SECRETS="${PROD_SECRETS},MONEY_HUNTER_ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT_SECRET}:latest"
          fi
          if [ -n "$TOSS_API_MTLS_CERTIFICATE_SECRET" ] && [ -n "$TOSS_API_MTLS_PRIVATE_KEY_SECRET" ]; then
            PROD_SECRETS="${PROD_SECRETS},TOSS_API_MTLS_CERTIFICATE_PEM=${TOSS_API_MTLS_CERTIFICATE_SECRET}:latest,TOSS_API_MTLS_PRIVATE_KEY_PEM=${TOSS_API_MTLS_PRIVATE_KEY_SECRET}:latest"
          fi
          gcloud run deploy "$PROD_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE" \
            --allow-unauthenticated \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --cpu "$PROD_CPU" \
            --memory "$PROD_MEMORY" \
            --min-instances "$PROD_MIN_INSTANCES" \
            --max-instances "$PROD_MAX_INSTANCES" \
            --concurrency "$PROD_CONCURRENCY" \
            --timeout "$PROD_TIMEOUT" \
            --set-env-vars "$PROD_ENV_VARS" \
            --set-secrets "$PROD_SECRETS"
          gcloud run services describe "$PROD_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format "value(status.url)"
